<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HappyTask CRM</title>
<style>
:root {
  --bg: #1a1a2e;
  --bg-card: #242442;
  --bg-muted: #2a2a4a;
  --bg-hover: #2e2e52;
  --text: #e8e8f0;
  --text-muted: #8888a8;
  --text-muted-2: #666688;
  --border: #3a3a5a;
  --brand: #F7880C;
  --brand-bg: rgba(247,136,12,0.12);
  --brand-bg2: rgba(247,136,12,0.06);
  --green: #22c55e;
  --green-bg: rgba(34,197,94,0.12);
  --blue: #3b82f6;
  --blue-bg: rgba(59,130,246,0.12);
  --purple: #8b5cf6;
  --purple-bg: rgba(139,92,246,0.12);
  --yellow: #f59e0b;
  --yellow-bg: rgba(245,158,11,0.12);
  --red: #ef4444;
  --red-bg: rgba(239,68,68,0.12);
  --cyan: #06b6d4;
  --sky: #0ea5e9;
  --sidebar-w: 240px;
  --font: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
.light {
  --bg: #f8f9fa;
  --bg-card: #ffffff;
  --bg-muted: #f1f3f5;
  --bg-hover: #e9ecef;
  --text: #1a1a2e;
  --text-muted: #6b7280;
  --text-muted-2: #9ca3af;
  --border: #e5e7eb;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }
a { color: inherit; text-decoration: none; }
button { cursor: pointer; font-family: inherit; }
input, select, textarea { font-family: inherit; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Layout */
.app { display: flex; min-height: 100vh; }
.sidebar { width: var(--sidebar-w); border-right: 1px solid var(--border); background: var(--bg-card); display: flex; flex-direction: column; height: 100vh; position: sticky; top: 0; flex-shrink: 0; }
.main { flex: 1; min-width: 0; padding: 24px; }

/* Sidebar */
.sidebar-logo { padding: 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; cursor: pointer; }
.sidebar-logo-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--brand); display: flex; align-items: center; justify-content: center; }
.sidebar-logo-icon svg { width: 18px; height: 18px; color: #000; }
.sidebar-logo-text { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; }
.sidebar-logo-text small { font-size: 10px; font-weight: 500; color: var(--text-muted); margin-left: 6px; text-transform: uppercase; letter-spacing: 2px; }
.sidebar-nav { flex: 1; padding: 12px; display: flex; flex-direction: column; gap: 2px; }
.nav-link { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 8px; font-size: 14px; font-weight: 500; color: var(--text-muted); transition: all 0.15s; }
.nav-link:hover { color: var(--text); background: var(--bg-muted); }
.nav-link.active { color: var(--brand); background: var(--brand-bg); }
.nav-link svg { width: 18px; height: 18px; }
.sidebar-footer { padding: 16px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
.theme-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 8px; border-radius: 8px; border: none; background: transparent; color: var(--text-muted); font-size: 13px; font-weight: 500; transition: all 0.15s; }
.theme-btn:hover { color: var(--text); background: var(--bg-muted); }
.sync-info { font-size: 11px; color: var(--text-muted); text-align: center; }

/* Cards */
.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.card-header { padding: 16px 20px 8px; }
.card-header h3 { font-size: 14px; font-weight: 600; }
.card-body { padding: 16px 20px; }
.card-body-np { padding: 0; }

/* Stat Cards */
.stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.stat-card { display: flex; align-items: center; gap: 16px; padding: 16px; }
.stat-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.stat-icon svg { width: 20px; height: 20px; }
.stat-value { font-size: 24px; font-weight: 700; }
.stat-label { font-size: 12px; color: var(--text-muted); }

/* Bar Charts */
.bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.bar-label { font-size: 14px; color: var(--text-muted); width: 128px; flex-shrink: 0; }
.bar-track { flex: 1; height: 28px; background: var(--bg-muted); border-radius: 8px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 8px; transition: width 0.5s ease; min-width: 2%; }
.bar-count { font-size: 14px; font-weight: 500; width: 40px; text-align: right; flex-shrink: 0; }

/* Table */
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 12px; font-size: 11px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); background: var(--bg-muted); }
td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 14px; vertical-align: middle; }
tr.clickable:hover { background: var(--bg-hover); cursor: pointer; }

/* Badges */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 9999px; font-size: 10px; font-weight: 600; border: 1px solid; white-space: nowrap; }
.badge-brand { background: var(--brand-bg); color: var(--brand); border-color: rgba(247,136,12,0.3); }
.badge-green { background: var(--green-bg); color: var(--green); border-color: rgba(34,197,94,0.3); }
.badge-blue { background: var(--blue-bg); color: var(--blue); border-color: rgba(59,130,246,0.3); }
.badge-purple { background: var(--purple-bg); color: var(--purple); border-color: rgba(139,92,246,0.3); }
.badge-yellow { background: var(--yellow-bg); color: var(--yellow); border-color: rgba(245,158,11,0.3); }
.badge-red { background: var(--red-bg); color: var(--red); border-color: rgba(239,68,68,0.3); }
.badge-cyan { background: rgba(6,182,212,0.12); color: var(--cyan); border-color: rgba(6,182,212,0.3); }
.badge-gray { background: var(--bg-muted); color: var(--text-muted); border-color: var(--border); }
.badge-indigo { background: rgba(99,102,241,0.12); color: #6366f1; border-color: rgba(99,102,241,0.3); }

/* Avatar */
.avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--brand-bg); color: var(--brand); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; flex-shrink: 0; }
.avatar-lg { width: 64px; height: 64px; border-radius: 16px; font-size: 24px; }

/* Form Elements */
.search-wrap { position: relative; }
.search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--text-muted); }
.search-input { width: 100%; padding: 8px 12px 8px 36px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text); font-size: 14px; outline: none; transition: border-color 0.15s; }
.search-input:focus { border-color: var(--brand); }
.select-input { padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text); font-size: 13px; outline: none; cursor: pointer; }
.select-input:focus { border-color: var(--brand); }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text); font-size: 13px; font-weight: 500; transition: all 0.15s; }
.btn:hover { background: var(--bg-hover); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-brand { background: var(--brand); color: #000; border-color: var(--brand); }
.btn-brand:hover { opacity: 0.9; }
.btn-sm { padding: 4px 10px; font-size: 12px; }

/* Filters row */
.filters-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

/* Pagination */
.pagination { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-top: 1px solid var(--border); }
.page-sizes { display: flex; gap: 4px; }
.page-size-btn { padding: 2px 8px; border-radius: 4px; font-size: 12px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; }
.page-size-btn.active { background: var(--brand-bg); color: var(--brand); font-weight: 500; }
.page-info { font-size: 12px; color: var(--text-muted); }
.page-nav { display: flex; gap: 4px; }
.page-nav button { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text); cursor: pointer; }
.page-nav button:disabled { opacity: 0.3; cursor: not-allowed; }
.page-nav button:hover:not(:disabled) { background: var(--bg-hover); }

/* Sort buttons */
.sort-btn { display: inline-flex; align-items: center; gap: 4px; background: none; border: none; color: var(--text-muted); font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; padding: 0; }
.sort-btn:hover { color: var(--text); }
.sort-btn svg { width: 12px; height: 12px; }
.sort-active { color: var(--brand); }

/* Activity indicators */
.activity-ind { display: flex; align-items: center; gap: 4px; font-size: 10px; }
.activity-ind svg { width: 12px; height: 12px; }

/* Contact cell */
.contact-cell { display: flex; align-items: center; gap: 12px; }
.contact-info { min-width: 0; }
.contact-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.contact-meta { display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.contact-meta svg { width: 12px; height: 12px; flex-shrink: 0; }
.contact-note { font-size: 11px; color: var(--text-muted); opacity: 0.6; margin-top: 2px; font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 300px; }
.location-cell { display: flex; align-items: center; gap: 4px; font-size: 13px; color: var(--text-muted); }
.location-cell svg { width: 12px; height: 12px; flex-shrink: 0; }

/* Today Actions */
.action-row { display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 8px; transition: background 0.15s; cursor: pointer; }
.action-row:hover { background: var(--bg-muted); }
.action-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.action-title { font-size: 14px; font-weight: 500; }
.action-count { font-size: 13px; color: var(--text-muted); }

/* Contact Profile */
.profile-header { display: flex; align-items: flex-start; gap: 20px; padding: 24px; }
.profile-badges { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
.profile-stats { display: flex; align-items: center; gap: 24px; margin-top: 16px; font-size: 12px; color: var(--text-muted); flex-wrap: wrap; }
.profile-stats span { display: flex; align-items: center; gap: 6px; }
.profile-stats svg { width: 14px; height: 14px; }
.profile-meta { display: flex; align-items: center; gap: 20px; margin-top: 8px; font-size: 14px; color: var(--text-muted); flex-wrap: wrap; }
.profile-meta span { display: flex; align-items: center; gap: 6px; }
.profile-meta svg { width: 14px; height: 14px; }

/* Negative Signals */
.signals-card { border-color: rgba(239,68,68,0.3); background: var(--red-bg); }
.signal-row { display: flex; align-items: center; gap: 8px; font-size: 14px; margin-bottom: 6px; }
.signal-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.signal-since { font-size: 12px; color: var(--text-muted); opacity: 0.6; }

/* Tabs */
.tabs-bar { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
.tab-btn { padding: 8px 16px; border: none; background: none; color: var(--text-muted); font-size: 13px; font-weight: 500; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* SMS Chat */
.sms-container { max-height: 600px; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
.sms-separator { display: flex; align-items: center; gap: 12px; margin: 12px 0; }
.sms-separator span { font-size: 11px; font-weight: 500; color: var(--text-muted); white-space: nowrap; }
.sms-separator-line { flex: 1; height: 1px; background: var(--border); }
.sms-bubble-wrap { display: flex; }
.sms-bubble-wrap.outbound { justify-content: flex-end; }
.sms-bubble-wrap.inbound { justify-content: flex-start; }
.sms-bubble { max-width: 75%; border-radius: 16px; padding: 10px 16px; font-size: 14px; white-space: pre-wrap; word-break: break-word; }
.sms-bubble.outbound { background: var(--brand-bg); border-bottom-right-radius: 4px; }
.sms-bubble.inbound { background: var(--bg-muted); border-bottom-left-radius: 4px; }
.sms-time { font-size: 10px; color: var(--text-muted); margin-top: 4px; }

/* Email list */
.email-row { padding: 14px 16px; border-bottom: 1px solid var(--border); transition: background 0.15s; }
.email-row:hover { background: var(--bg-hover); }
.email-subject { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.email-badges { display: flex; align-items: center; gap: 12px; margin-top: 6px; flex-wrap: wrap; }
.email-badge { display: flex; align-items: center; gap: 4px; font-size: 10px; }
.email-badge svg { width: 12px; height: 12px; }
.email-date { font-size: 10px; color: var(--text-muted); white-space: nowrap; flex-shrink: 0; }

/* Sequence progress */
.seq-bar { display: flex; gap: 4px; }
.seq-step { height: 8px; flex: 1; border-radius: 9999px; background: var(--bg-muted); }
.seq-step.done { background: var(--brand); }

/* Notes */
.note-card { padding: 12px; border-radius: 8px; background: var(--bg-muted); border: 1px solid var(--border); margin-bottom: 12px; }
.note-header { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
.note-body { font-size: 14px; white-space: pre-wrap; }
.note-date { font-size: 10px; color: var(--text-muted); margin-top: 8px; }

/* Detail rows */
.detail-row { display: flex; justify-content: space-between; align-items: baseline; padding: 4px 0; font-size: 14px; }
.detail-label { color: var(--text-muted); }
.detail-value { font-weight: 500; }

/* Two column layout */
.two-col { display: flex; gap: 24px; }
.col-left { flex: 1; min-width: 0; }
.col-right { width: 420px; flex-shrink: 0; }

/* Timeline */
.timeline-row { display: flex; gap: 12px; padding: 12px; transition: background 0.15s; }
.timeline-row:hover { background: var(--bg-hover); }
.timeline-row + .timeline-row { border-top: 1px solid var(--border); }
.timeline-icon { width: 32px; height: 32px; border-radius: 50%; background: var(--bg-muted); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.timeline-icon svg { width: 14px; height: 14px; }
.timeline-title { font-size: 14px; font-weight: 500; }
.timeline-desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.timeline-time { font-size: 12px; color: var(--text-muted); flex-shrink: 0; }

/* Heatmap */
.heatmap { display: flex; gap: 2px; overflow-x: auto; padding: 4px 0; }
.heatmap-col { display: flex; flex-direction: column; gap: 2px; }
.heatmap-cell { width: 10px; height: 10px; border-radius: 2px; background: var(--bg-muted); }
.hm-1 { background: rgba(247,136,12,0.2); }
.hm-2 { background: rgba(247,136,12,0.4); }
.hm-3 { background: rgba(247,136,12,0.6); }
.hm-4 { background: var(--brand); }

/* Outreach tiers */
.tier-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.tier-card { cursor: pointer; transition: all 0.15s; }
.tier-card:hover { border-color: var(--text-muted); }
.tier-card.selected { border-width: 2px; }
.tier-header { display: flex; align-items: flex-start; justify-content: space-between; }
.tier-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.tier-icon svg { width: 18px; height: 18px; }
.tier-count { font-size: 24px; font-weight: 700; }
.tier-priority { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); font-weight: 500; }
.tier-name { font-size: 14px; font-weight: 600; margin-top: 12px; }
.tier-desc { font-size: 14px; color: var(--text-muted); margin-top: 4px; line-height: 1.4; }

/* Outreach contact row */
.outreach-contact { display: flex; align-items: center; gap: 16px; padding: 12px 16px; border-bottom: 1px solid var(--border); transition: background 0.15s; cursor: pointer; }
.outreach-contact:hover { background: var(--bg-hover); }

/* Merge page */
.merge-banner { padding: 16px; border-radius: 8px; display: flex; align-items: center; gap: 12px; }
.merge-entry { padding: 12px; border-bottom: 1px solid var(--border); font-size: 14px; }

/* Password Gate */
.pw-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
.pw-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 380px; max-width: 90vw; text-align: center; }
.pw-logo { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 24px; }
.pw-input { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; margin: 16px 0; outline: none; text-align: center; }
.pw-input:focus { border-color: var(--brand); }
.pw-error { color: var(--red); font-size: 13px; margin-bottom: 12px; }
.pw-btn { width: 100%; padding: 10px; border-radius: 8px; border: none; background: var(--brand); color: #000; font-size: 14px; font-weight: 600; cursor: pointer; }
.pw-btn:hover { opacity: 0.9; }

/* Responsive */
@media (max-width: 1024px) {
  .stat-grid { grid-template-columns: repeat(2, 1fr); }
  .tier-grid { grid-template-columns: repeat(2, 1fr); }
  .two-col { flex-direction: column; }
  .col-right { width: 100%; }
}
@media (max-width: 768px) {
  .sidebar { display: none; }
  .main { padding: 16px; }
  .stat-grid { grid-template-columns: 1fr; }
  .tier-grid { grid-template-columns: 1fr; }
  .filters-row { flex-direction: column; align-items: stretch; }
}

/* Utility */
.flex { display: flex; }
.items-center { align-items: center; }
.gap-2 { gap: 8px; }
.gap-3 { gap: 12px; }
.mt-2 { margin-top: 8px; }
.mt-4 { margin-top: 16px; }
.mt-6 { margin-top: 24px; }
.mb-2 { margin-bottom: 8px; }
.mb-4 { margin-bottom: 16px; }
.mb-6 { margin-bottom: 24px; }
.text-sm { font-size: 14px; }
.text-xs { font-size: 12px; }
.text-muted { color: var(--text-muted); }
.font-bold { font-weight: 700; }
.space-y > * + * { margin-top: 24px; }
.hidden { display: none !important; }
.truncate { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.w-full { width: 100%; }
.text-right { text-align: right; }
.text-center { text-align: center; }
.flex-1 { flex: 1; min-width: 0; }
.shrink-0 { flex-shrink: 0; }
.nowrap { white-space: nowrap; }
</style>
</head>
<body>

<!-- Password Gate -->
<div id="pw-gate" class="pw-overlay">
  <div class="pw-card">
    <div class="pw-logo">
      <div class="sidebar-logo-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div>
      <span style="font-size:20px;font-weight:700">HappyTask <span style="font-size:11px;color:var(--text-muted);letter-spacing:2px">CRM</span></span>
    </div>
    <p style="color:var(--text-muted);font-size:14px;margin-bottom:8px">Enter password to continue</p>
    <input type="password" id="pw-input" class="pw-input" placeholder="Password" autofocus>
    <div id="pw-error" class="pw-error hidden"></div>
    <button onclick="checkPassword()" class="pw-btn">Sign In</button>
  </div>
</div>

<!-- App Shell -->
<div id="app" class="app hidden">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo" onclick="navigate('dashboard')">
      <div class="sidebar-logo-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div>
      <span class="sidebar-logo-text">HappyTask<small>CRM</small></span>
    </div>
    <nav class="sidebar-nav" id="nav"></nav>
    <div class="sidebar-footer">
      <div class="sync-info" id="sync-info"></div>
    </div>
  </aside>
  <!-- Main Content -->
  <main class="main" id="main-content"></main>
</div>

<script>
// =================== SVG Icons ===================

const PW = 'happytask2026';

  const val = document.getElementById('pw-input').value;

// =================== Theme ===================
function applyTheme() {
  document.documentElement.className = currentTheme === 'light' ? 'light' : '';
  const btn = document.getElementById('theme-toggle');
  if (btn) btn.innerHTML = (currentTheme === 'dark' ? icons.sun : icons.moon) + '<span>' + (currentTheme === 'dark' ? 'Light Mode' : 'Dark Mode') + '</span>';
}
function toggleTheme() {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  localStorage.setItem('ht-theme', currentTheme);
  applyTheme();
}
applyTheme();

// =================== Time Utilities ===================
function timeAgo(dateStr) {
  if (!dateStr) return '';
  const now = new Date();
  const date = new Date(dateStr);
  const diff = now - date;
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  if (days < 7) return days + 'd ago';
  if (days < 30) return Math.floor(days / 7) + 'w ago';
  if (days < 365) return Math.floor(days / 30) + 'mo ago';
  return Math.floor(days / 365) + 'y ago';
}
function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
}
function formatDateTime(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let h = d.getHours(), m = d.getMinutes(), ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return months[d.getMonth()] + ' ' + d.getDate() + ', ' + h + ':' + String(m).padStart(2,'0') + ' ' + ampm;
}
function formatTime(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  let h = d.getHours(), m = d.getMinutes(), ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return h + ':' + String(m).padStart(2,'0') + ' ' + ampm;
}
function formatFullDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
}
function dateKey(dateStr) {
  if (!dateStr) return '';
  return new Date(dateStr).toISOString().split('T')[0];
}
function formatHours(hours) {
  if (hours < 1) return Math.round(hours * 60) + 'm';
  if (hours < 24) return hours.toFixed(1) + 'h';
  const days = Math.floor(hours / 24);
  const rem = hours % 24;
  return days + 'd ' + Math.round(rem) + 'h';
}
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// =================== Data Loading ===================
async function loadApp() {
  try {
    const res = await fetch('./data/crm-data.json');
    DATA = await res.json();
  } catch (e) {
    document.getElementById('main-content').innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-muted)"><p style="font-size:18px;font-weight:600;margin-bottom:8px">Data not found</p><p>Place crm-data.json in ./data/ directory</p></div>';
    return;
  }
  buildNav();
  applyTheme();
  window.addEventListener('hashchange', route);
  route();
}

// =================== Navigation ===================
const NAV_ITEMS = [
  { hash: 'dashboard', label: 'Dashboard', icon: 'dashboard' },
  { hash: 'contacts', label: 'Contacts', icon: 'users' },
  { hash: 'outreach', label: 'Outreach', icon: 'target' },
  { hash: 'service-count', label: 'Service Count', icon: 'users' },
  { hash: 'merge', label: 'Merge Review', icon: 'merge' },
];
function buildNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = NAV_ITEMS.map(n => `<a class="nav-link" data-hash="${n.hash}" onclick="navigate('${n.hash}')">${icons[n.icon]}<span>${n.label}</span></a>`).join('');
  const si = document.getElementById('sync-info');
  si.textContent = DATA.exported_at ? 'Last synced: ' + formatDateTime(DATA.exported_at) : '';
}
function navigate(hash) {
  window.location.hash = '#' + hash;
}
function route() {
  const hash = window.location.hash.slice(1) || 'dashboard';
  document.querySelectorAll('.nav-link').forEach(el => {
    el.classList.toggle('active', hash.startsWith(el.dataset.hash));
  });
  const main = document.getElementById('main-content');
  if (hash === 'dashboard') renderDashboard(main);
  else if (hash === 'contacts') renderContacts(main);
  else if (hash.startsWith('contacts/')) renderContactProfile(main, hash.split('/')[1]);
  else if (hash.startsWith('outreach')) {
    // Restore selected tier from hash if present (e.g. outreach?tier=texted_no_reply)
    const tierMatch = hash.match(/tier=([^&]+)/);
    if (tierMatch) state.selectedTier = tierMatch[1];
    renderOutreach(main);
  }
  else if (hash === 'service-count') renderServiceCount(main);
  else if (hash === 'merge') renderMerge(main);
  else renderDashboard(main);
  main.scrollTop = 0;
  window.scrollTo(0, 0);
}

// =================== Badge Helpers ===================
function lifecycleBadge(stage) {
  const map = { lead:'badge-blue', texted:'badge-purple', spoke_with:'badge-indigo', enrolled:'badge-brand', active_provider:'badge-green', active_client:'badge-cyan', churned:'badge-red' };
  const labels = { lead:'Lead', texted:"SMS'd, No Reply", spoke_with:'Replied to SMS', enrolled:'Enrolled', active_provider:'Active Provider', active_client:'Active Client', churned:'Churned' };
  return `<span class="badge ${map[stage]||'badge-gray'}">${labels[stage]||stage||'--'}</span>`;
}
function engagementBadge(status) {
  const map = { hot:'badge-brand', engaged:'badge-green', warm:'badge-yellow', cold:'badge-gray', gone_dark:'badge-red', new:'badge-blue', churned:'badge-red' };
  const labels = { hot:'Hot', engaged:'Engaged', warm:'Warm', cold:'Cold', gone_dark:'Gone Dark', new:'New', churned:'Churned' };
  return `<span class="badge ${map[status]||'badge-gray'}">${labels[status]||status||'--'}</span>`;
}
function typeBadge(type) {
  const map = { 'Service Provider':'badge-green', 'Client':'badge-blue', 'Zip Leads':'badge-purple', 'Paid Google Ad':'badge-yellow' };
  return type ? `<span class="badge ${map[type]||'badge-gray'}">${esc(type)}</span>` : '<span class="text-muted">--</span>';
}
function dispositionBadge(d) {
  if (!d || d === 'none') return '';
  const map = { interested:'badge-green', hesitant:'badge-yellow', needs_callback:'badge-brand', no_show:'badge-red', not_interested:'badge-gray', left_voicemail:'badge-purple', scheduled_followup:'badge-blue', enrolled:'badge-green' };
  return `<span class="badge ${map[d]||'badge-gray'}">${esc(d.replace(/_/g,' '))}</span>`;
}

// =================== Log Scale ===================
function logScale(n, max) {
  if (n === 0) return 0;
  return (Math.log(n + 1) / Math.log(max + 1)) * 100;
}

  const lifecycleStages = [
    { key: 'lead', label: 'Lead', color: '#3b82f6' },
    { key: 'texted', label: "SMS'd, No Reply", color: '#8b5cf6' },
    { key: 'spoke_with', label: 'Replied to SMS', color: '#6366f1' },
    { key: 'enrolled', label: 'Enrolled', color: '#F7880C' },
    { key: 'active_provider', label: 'Active Provider', color: '#22c55e' },
    { key: 'active_client', label: 'Active Client', color: '#06b6d4' },
    { key: 'churned', label: 'Churned', color: '#ef4444' },
  ];
  const engagementStatuses = [
    { key: 'hot', label: 'Hot', color: '#F7880C' },

    { key: 'new', label: 'New', color: '#3b82f6' },
  ];

  const pip = s.pipeline || {};
  const eng = s.engagement || {};
  const maxP = Math.max(...lifecycleStages.map(x => pip[x.key] || 0), 1);
  const maxE = Math.max(...engagementStatuses.map(x => eng[x.key] || 0), 1);

  let html = '<div class="space-y"><h1 style="font-size:24px;font-weight:700">Dashboard</h1>';

  html += '</div>';

  // Pipeline
  html += '<div class="card"><div class="card-header"><h3>Pipeline</h3></div><div class="card-body">';
  lifecycleStages.forEach(st => {
    const count = pip[st.key] || 0;
    const pct = logScale(count, maxP);
    html += `<div class="bar-row"><span class="bar-label">${st.label}</span><div class="bar-track"><div class="bar-fill" style="width:${Math.max(pct,2)}%;background:${st.color}"></div></div><span class="bar-count">${count}</span></div>`;
  });
  html += '</div></div>';

  // Engagement Distribution (bar chart)
  html += '<div class="card"><div class="card-header"><h3>Engagement Distribution</h3></div><div class="card-body">';
  engagementStatuses.forEach(st => {
    const count = eng[st.key] || 0;

  });
  html += '</div></div>';

  html += '</div>';
  el.innerHTML = html;
}

// =================== CONTACTS ===================
function getFilteredContacts() {
  let list = DATA.contacts || [];
  const q = state.search.toLowerCase().trim();
  if (q) {
    const noteMap = {};
    (DATA.notes || []).forEach(n => { if (!noteMap[n.contact_id]) noteMap[n.contact_id] = ''; noteMap[n.contact_id] += ' ' + (n.body || ''); });
    const smsMap = {};
    (DATA.smsMessages || []).forEach(m => { if (!smsMap[m.contact_id]) smsMap[m.contact_id] = ''; smsMap[m.contact_id] += ' ' + (m.body || ''); });
    list = list.filter(c => {
      const hay = [c.full_name, c.first_name, c.last_name, c.email, c.phone, c.last_note_preview, noteMap[c.id], smsMap[c.id]].filter(Boolean).join(' ').toLowerCase();
      return hay.includes(q);
    });
  }
  if (state.lifecycle !== 'all') list = list.filter(c => c.lifecycle_stage === state.lifecycle);
  if (state.engagement !== 'all') list = list.filter(c => c.engagement_status === state.engagement);
  if (state.accountType !== 'all') list = list.filter(c => c.account_type === state.accountType);

  if (state.sortBy === 'activity_count') {
    list = [...list].sort((a, b) => {
      const ac = (a.email_count||0) + (a.sms_count||0) + (a.call_count||0);
      const bc = (b.email_count||0) + (b.sms_count||0) + (b.call_count||0);
      return state.sortDir === 'desc' ? bc - ac : ac - bc;
    });
  } else if (state.sortBy === 'last_activity') {
    list = [...list].sort((a, b) => {
      const at = a.last_activity_at ? new Date(a.last_activity_at).getTime() : 0;
      const bt = b.last_activity_at ? new Date(b.last_activity_at).getTime() : 0;
      return state.sortDir === 'desc' ? bt - at : at - bt;
    });
  }
  return list;
}

function toggleSort(field) {
  if (state.sortBy === field) {
    if (state.sortDir === 'desc') state.sortDir = 'asc';
    else { state.sortBy = null; state.sortDir = 'desc'; }
  } else {
    state.sortBy = field;
    state.sortDir = 'desc';
  }
  state.page = 0;
  renderContacts(document.getElementById('main-content'));
}

  html += '</div></div></div>';

  html += '<div class="col-right">';

  // SMS Tab
  html += `<div class="tab-content${state.profileTab==='sms'?' active':''}" id="tab-sms"><div class="card">`;
  if (sms.length === 0) {

  }

  html += `<div class="tab-content${state.profileTab==='emails'?' active':''}" id="tab-emails"><div class="card"><div class="card-body-np">`;

  if (sequences.length > 0) {

      html += `<div style="padding:16px;border-bottom:1px solid var(--border)">

  // Group emails by subject
  if (emails.length === 0) {
    html += '<p style="padding:32px;text-align:center;color:var(--text-muted);font-size:14px">No email events</p>';
  } else {
    const bySubject = new Map();
    emails.forEach(evt => {
      const key = evt.email_subject || evt.id;
      if (!bySubject.has(key)) bySubject.set(key, []);
      bySubject.get(key).push(evt);

    bySubject.forEach((events, subject) => {
      const types = new Set(events.map(e => (e.event_type||'').toLowerCase()));
      const sent = types.has('requests') || types.has('sent') || types.has('delivered');
      const delivered = types.has('delivered');
      const opened = types.has('opened') || types.has('loadedbyproxy');
      const clicked = types.has('clicks') || types.has('clicked');

  // Details Tab

  // Attribution
  html += `<div class="card mb-4"><div class="card-header"><h3 style="font-size:14px">Attribution</h3></div><div class="card-body">
    ${detailRow('Source', c.source)}

  // Communication Prefs

  // Connected Systems

  if (sources.length === 0) {

  }
  html += '</div></div>';

  html += '</div>'; // end details tab
  html += '</div>'; // end col-right
  html += '</div>'; // end two-col
  html += '</div>'; // end space-y
  el.innerHTML = html;
}

function computeNegativeSignals(c, emails, sms, calls) {
  const signals = [];
  const sentEmails = emails.filter(e => ['sent','delivered','requests'].includes((e.event_type||'').toLowerCase()));
  const openedEmails = emails.filter(e => ['opened','loadedbyproxy','clicks','clicked'].includes((e.event_type||'').toLowerCase()));
  if (sentEmails.length > 0 && openedEmails.length === 0) {
    signals.push({ severity: 'warning', message: sentEmails.length + ' emails sent, none opened', since: null });
  }
  const outSms = sms.filter(m => m.direction === 'outbound');
  const inSms = sms.filter(m => m.direction === 'inbound');
  if (outSms.length > 0 && inSms.length === 0) {
    signals.push({ severity: 'warning', message: outSms.length + ' SMS sent, no reply received', since: outSms[outSms.length-1]?.sent_at });
  }
  const recentCalls = [...calls].sort((a,b) => new Date(b.started_at) - new Date(a.started_at));
  let vmStreak = 0;
  for (const cl of recentCalls) { if (cl.outcome === 'voicemail' || cl.outcome === 'no_answer') vmStreak++; else break; }
  if (vmStreak >= 2) {
    signals.push({ severity: vmStreak >= 3 ? 'danger' : 'warning', message: vmStreak + ' consecutive voicemails/no answers', since: recentCalls[0]?.started_at });
  }
  if (c.engagement_status === 'gone_dark') {
    signals.push({ severity: 'danger', message: 'Contact has gone dark', since: c.gone_dark_since });
  }
  return signals;
}

function buildHeatmap(contactId) {
  const now = new Date();
  const dayMs = 86400000;
  const dayMap = {};

  ['emailEvents','smsMessages','callLogs'].forEach(key => {
    (DATA[key] || []).filter(e => e.contact_id === contactId).forEach(e => {
      const d = dateKey(e.event_at || e.sent_at || e.started_at);
      if (d) dayMap[d] = (dayMap[d] || 0) + 1;
    });
  });

  let html = '';
  const startDate = new Date(now.getTime() - 89 * dayMs);
  const startDay = startDate.getDay();
  const totalDays = 90;

  const weeks = [];
  let currentWeek = [];
  for (let i = 0; i < startDay; i++) currentWeek.push(null);
  for (let i = 0; i < totalDays; i++) {
    const d = new Date(startDate.getTime() + i * dayMs);
    currentWeek.push(dateKey(d.toISOString()));
    if (currentWeek.length === 7) {
      weeks.push(currentWeek);
      currentWeek = [];
    }
  }
  if (currentWeek.length > 0) {
    while (currentWeek.length < 7) currentWeek.push(null);
    weeks.push(currentWeek);
  }

  weeks.forEach(week => {
    html += '<div class="heatmap-col">';
    week.forEach(day => {
      if (!day) { html += '<div class="heatmap-cell"></div>'; return; }
      const count = dayMap[day] || 0;
      const cls = count === 0 ? '' : count <= 1 ? 'hm-1' : count <= 3 ? 'hm-2' : count <= 6 ? 'hm-3' : 'hm-4';
      html += `<div class="heatmap-cell ${cls}" title="${day}: ${count} events"></div>`;
    });
    html += '</div>';
  });
  return html;
}

function buildTimeline(contactId) {
  const events = [];
  const iconColorMap = {
    email_sent: { icon: icons.send, color: 'var(--blue)' },
    email_opened: { icon: icons.eye, color: 'var(--green)' },
    email_clicked: { icon: icons.click, color: 'var(--brand)' },
    sms_sent: { icon: icons.send, color: 'var(--brand)' },
    sms_received: { icon: icons.sms, color: 'var(--green)' },
    call_made: { icon: icons.phone, color: 'var(--purple)' },
    call_received: { icon: icons.phone, color: 'var(--purple)' },
    note_added: { icon: icons.sms, color: 'var(--text-muted)' },
  };

  (DATA.emailEvents || []).filter(e => e.contact_id === contactId).forEach(e => {
    const type = (e.event_type||'').toLowerCase();
    let evtType = 'email_sent';
    if (type.includes('open') || type === 'loadedbyproxy') evtType = 'email_opened';
    else if (type.includes('click')) evtType = 'email_clicked';
    const ic = iconColorMap[evtType] || { icon: icons.mail, color: 'var(--text-muted)' };
    events.push({ title: 'Email ' + type, description: e.email_subject, date: e.event_at, icon: ic.icon, color: ic.color });
  });

  (DATA.smsMessages || []).filter(m => m.contact_id === contactId).forEach(m => {
    const evtType = m.direction === 'outbound' ? 'sms_sent' : 'sms_received';
    const ic = iconColorMap[evtType];
    events.push({ title: m.direction === 'outbound' ? 'SMS sent' : 'SMS received', description: m.body ? (m.body.substring(0, 80) + (m.body.length > 80 ? '...' : '')) : '', date: m.sent_at, icon: ic.icon, color: ic.color });
  });

  (DATA.callLogs || []).filter(cl => cl.contact_id === contactId).forEach(cl => {
    const ic = iconColorMap.call_made;
    events.push({ title: cl.direction === 'outbound' ? 'Call made' : 'Call received', description: cl.outcome + (cl.duration_seconds ? ' (' + cl.duration_seconds + 's)' : ''), date: cl.started_at, icon: ic.icon, color: ic.color });
  });

  (DATA.notes || []).filter(n => n.contact_id === contactId).forEach(n => {
    const ic = iconColorMap.note_added;
    events.push({ title: 'Note added', description: n.body ? (n.body.substring(0, 80) + (n.body.length > 80 ? '...' : '')) : '', date: n.created_at, icon: ic.icon, color: ic.color });
  });

  events.sort((a, b) => new Date(b.date) - new Date(a.date));
  return events;
}

function computeResponseTimes(sms) {
  const sorted = [...sms].sort((a,b) => new Date(a.sent_at) - new Date(b.sent_at));
  const themTimes = [];
  const usTimes = [];

  for (let i = 1; i < sorted.length; i++) {
    const prev = sorted[i-1];
    const curr = sorted[i];
    const diffHours = (new Date(curr.sent_at) - new Date(prev.sent_at)) / 3600000;
    if (prev.direction === 'outbound' && curr.direction === 'inbound') {
      themTimes.push(diffHours);
    } else if (prev.direction === 'inbound' && curr.direction === 'outbound') {
      usTimes.push(diffHours);
    }
  }
  return {
    avgThem: themTimes.length > 0 ? themTimes.reduce((a,b) => a+b, 0) / themTimes.length : null,
    avgUs: usTimes.length > 0 ? usTimes.reduce((a,b) => a+b, 0) / usTimes.length : null,
    fastest: themTimes.length > 0 ? Math.min(...themTimes) : null,
  };
}

// =================== OUTREACH (13 Independent Tiers) ===================
function computeOutreachTiers() {
  const contacts = DATA.contacts || [];
  const emailEvents = DATA.emailEvents || [];
  const smsMessages = DATA.smsMessages || [];
  const programProgress = DATA.programProgress || [];

  // Build lookup sets
  const openedContactIds = new Set();
  const clickedContactIds = new Set();
  const sentContactIds = new Set();
  const emailedContactIds = new Set();
  const smsOutContactIds = new Set();
  const smsInContactIds = new Set();
  const bouncedContactIds = new Set();
  const unsubContactIds = new Set();

  emailEvents.forEach(e => {
    if (!e.contact_id) return;
    const t = (e.event_type || '').toLowerCase();
    emailedContactIds.add(e.contact_id);
    if (['sent','delivered','requests'].includes(t)) sentContactIds.add(e.contact_id);
    if (['opened','loadedbyproxy','clicks','clicked'].includes(t)) openedContactIds.add(e.contact_id);
    if (['clicks','clicked'].includes(t)) clickedContactIds.add(e.contact_id);
    if (['bounced','hardbounce','softbounce'].includes(t)) bouncedContactIds.add(e.contact_id);
    if (['unsubscribed','spam_report'].includes(t)) unsubContactIds.add(e.contact_id);
  });
  smsMessages.forEach(m => {
    if (!m.contact_id) return;
    if (m.direction === 'outbound') smsOutContactIds.add(m.contact_id);
    if (m.direction === 'inbound') smsInContactIds.add(m.contact_id);
  });

  // Build SMS timeline per contact for "waiting on us" logic
  const lastInboundNoReply = new Set();
  const smsByContact = {};
  smsMessages.forEach(m => {
    if (!m.contact_id) return;
    if (!smsByContact[m.contact_id]) smsByContact[m.contact_id] = [];
    smsByContact[m.contact_id].push(m);
  });
  Object.entries(smsByContact).forEach(([cid, msgs]) => {
    const sorted = msgs.sort((a,b) => new Date(a.sent_at) - new Date(b.sent_at));
    // Find inbound messages where there's no outbound after them
    for (const msg of sorted) {
      if (msg.direction === 'inbound') {
        const hasReplyAfter = sorted.some(m2 => m2.direction === 'outbound' && new Date(m2.sent_at) > new Date(msg.sent_at));
        if (!hasReplyAfter) {
          lastInboundNoReply.add(cid);
          break;
        }
      }
    }
  });

  // Program progress lookup
  const stalledIds = new Set();
  programProgress.forEach(p => {
    if (p.status === 'active' && ['at_risk','behind'].includes(p.risk_level)) {
      stalledIds.add(p.contact_id);
    }
  });

  // Helper: not SP/Client and not DNC
  function isNotSpClientDnc(c) {
    return c.account_type !== 'Service Provider' && c.account_type !== 'Client' && !c.do_not_contact;
  }

  // All 13 tiers - INDEPENDENT (not mutually exclusive)
  const tierDefs = [
    {
      id: 'texted_no_reply', name: 'Texted, No Reply',
      desc: 'We sent them a text but they never responded. Follow up with another text or try calling.',
      color: '#F7880C', priority: 1, icon: icons.sms,
      filter: c => smsOutContactIds.has(c.id) && !smsInContactIds.has(c.id) && isNotSpClientDnc(c),
    },
    {
      id: 'opened_email_never_texted', name: 'Opened Email, Not Texted',
      desc: 'They opened at least one email showing interest but we have never texted them. They have a phone number ready.',
      color: '#22c55e', priority: 2, icon: icons.mailOpen,
      filter: c => openedContactIds.has(c.id) && c.phone && !smsOutContactIds.has(c.id) && isNotSpClientDnc(c),
    },
    {
      id: 'clicked_link', name: 'Clicked Link in Email',
      desc: 'They clicked a link in our email. This is the strongest intent signal. High priority to text or call.',
      color: '#10b981', priority: 3, icon: icons.click,
      filter: c => clickedContactIds.has(c.id) && c.phone && isNotSpClientDnc(c),
    },
    {
      id: 'emailed_not_texted', name: 'Emailed, Never Texted',
      desc: 'We emailed them (opened or not) but never texted. They have a phone number we can try.',
      color: '#3b82f6', priority: 4, icon: icons.send,
      filter: c => emailedContactIds.has(c.id) && c.phone && !smsOutContactIds.has(c.id) && isNotSpClientDnc(c),
    },
    {
      id: 'emailed_never_opened', name: 'Emailed, Never Opened',
      desc: 'We sent emails but they never opened any. Have a phone number so try SMS or call instead.',
      color: '#6366f1', priority: 5, icon: icons.mailWarning,
      filter: c => sentContactIds.has(c.id) && !openedContactIds.has(c.id) && c.phone && isNotSpClientDnc(c),
    },
    {
      id: 'never_emailed_has_phone', name: 'Has Phone, Never Reached Out',
      desc: 'We have never emailed or texted them but they have a phone number. Completely fresh outreach.',
      color: '#8b5cf6', priority: 6, icon: icons.phoneCall,
      filter: c => c.phone && !emailedContactIds.has(c.id) && !smsOutContactIds.has(c.id) && !smsInContactIds.has(c.id) && isNotSpClientDnc(c),
    },
    {
      id: 'replied_not_signed_up', name: 'Replied, Never Signed Up',
      desc: 'They actually texted us back showing real interest but never became a Service Provider. A quick follow-up could close them.',
      color: '#f43f5e', priority: 7, icon: icons.flame,
      filter: c => smsInContactIds.has(c.id) && isNotSpClientDnc(c),
    },
    {
      id: 'signed_up_stalled', name: 'Signed Up, Stalled',
      desc: 'They signed up as a Service Provider but have not made it into the dashboard yet. Mirrors the Onboarding bucket on Service Count.',
      color: '#d946ef', priority: 8, icon: icons.sms,
      filter: c => c.account_type === 'Service Provider'
        && (c.lifecycle_stage === 'enrolled' || c.lifecycle_stage === 'active_provider')
        && !c.in_dashboard,
    },
    {
      id: 'waiting_on_us', name: 'Waiting on Us',
      desc: 'They replied to our text but we never responded back. We are actively losing these people by not following up.',
      color: '#e11d48', priority: 9, icon: icons.phoneCall,
      filter: c => lastInboundNoReply.has(c.id),
    },
    {
      id: 'paid_ad_never_engaged', name: 'Google Ad, Never Engaged',
      desc: 'Came from a paid Google Ad (cost us money) but never opened an email or replied to a text. Try calling or a different approach.',
      color: '#ea580c', priority: 10, icon: icons.ban,
      filter: c => c.source === 'PAID_SEARCH' && !openedContactIds.has(c.id) && !smsInContactIds.has(c.id) && !c.do_not_contact,
    },
    {
      id: 'engaged_went_cold', name: 'Was Engaged, Went Cold',
      desc: 'They were active (opened emails or replied to texts) but have gone quiet for 14+ days. A re-engagement text could bring them back.',
      color: '#0ea5e9', priority: 11, icon: icons.mailWarning,
      filter: c => c.engagement_status === 'cold' && (openedContactIds.has(c.id) || smsInContactIds.has(c.id)) && isNotSpClientDnc(c),
    },
    {
      id: 'never_contacted', name: 'No Phone, Never Contacted',
      desc: 'We have never emailed or texted them and have no phone number. Email-only outreach or need to find their number.',
      color: '#64748b', priority: 12, icon: icons.userX,
      filter: c => !c.phone && !emailedContactIds.has(c.id) && isNotSpClientDnc(c),
    },
    {
      id: 'do_not_contact', name: 'Do Not Contact',
      desc: 'Unsubscribed, bounced, replied "no/stop", or marked do-not-contact. Do NOT reach out.',
      color: '#ef4444', priority: 13, icon: icons.ban,
      filter: c => c.do_not_contact || c.email_consent === 0 || c.sms_consent === 0,
    },
  ];

  return tierDefs.map(def => {
    const list = contacts.filter(def.filter);
    return { ...def, contacts: list, count: list.length };
  });
}

function selectTier(id) {
  state.selectedTier = state.selectedTier === id ? null : id;
  state.tierPage = 0;
  // Store tier in hash so back navigation restores it
  if (state.selectedTier) {
    history.replaceState(null, '', '#outreach?tier=' + state.selectedTier);
  } else {
    history.replaceState(null, '', '#outreach');
  }
  renderOutreach(document.getElementById('main-content'));
}

function exportTierCSV(tierId) {
  const tier = (window._outreachTiers || []).find(t => t.id === tierId);
  if (!tier) return;
  const rows = [['Name','Email','Phone','Type','Source','City','State','Last Activity']];
  tier.contacts.forEach(c => {
    rows.push([c.full_name||'', c.email||'', c.phone||'', c.account_type||'', c.source||'', c.city||'', c.state||'', c.last_activity_at||'']);
  });
  const csv = rows.map(r => r.map(v => '"' + String(v).replace(/"/g,'""') + '"').join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = tierId + '-contacts.csv'; a.click();
  URL.revokeObjectURL(url);
}

const SERVICE_COLORS = {
  'Handyman Work': '#F7880C',

  'Pet Sitter': '#8b5cf6',
  'Lawn Care & Landscaping': '#84cc16',
  'Photographer': '#3b82f6',
  'Personal Trainer': '#ef4444',
  'Unspecified': '#64748b',

function computeServiceGroups() {
  const contacts = (DATA.contacts || []).filter(c =>
    c.account_type === 'Service Provider' &&
    (c.lifecycle_stage === 'enrolled' || c.lifecycle_stage === 'active_provider')
  );
  const groups = {};
  contacts.forEach(c => {
    const key = c.service_type || 'Unspecified';
    if (!groups[key]) groups[key] = [];
    groups[key].push(c);
  });
  return Object.keys(groups).sort((a,b) => groups[b].length - groups[a].length).map(name => ({
    name,
    count: groups[name].length,
    color: SERVICE_COLORS[name] || '#64748b',
    contacts: groups[name].sort((a,b) => (b.last_activity_at||'').localeCompare(a.last_activity_at||'')),
  }));
}

          <span style="font-size:10px;color:var(--text-muted);width:80px;text-align:right" class="shrink-0">${c.last_activity_at ? timeAgo(c.last_activity_at) : '--'}</span>
          <span style="color:var(--text-muted);opacity:0.4" class="shrink-0">${icons.chevRight}</span>
        </div>`;
      });
      const totalSvcPages = Math.ceil(bucketContacts.length / state.svcLimit);
      html += `<div class="pagination">
        <div class="flex items-center gap-3">
          <span class="page-info">Showing ${state.svcPage * state.svcLimit + 1}–${Math.min((state.svcPage+1)*state.svcLimit, bucketContacts.length)} of ${bucketContacts.length}</span>
          <div class="page-sizes">
            ${[25,50,100].map(n => `<button class="page-size-btn${state.svcLimit===n?' active':''}" onclick="state.svcLimit=${n};state.svcPage=0;renderServiceCount(document.getElementById('main-content'))">${n}</button>`).join('')}
          </div>
        </div>
        <div class="page-nav">
          <button class="page-btn" ${state.svcPage===0?'disabled':''} onclick="state.svcPage--;renderServiceCount(document.getElementById('main-content'))">${icons.chevLeft}</button>
          <button class="page-btn" ${state.svcPage>=totalSvcPages-1?'disabled':''} onclick="state.svcPage++;renderServiceCount(document.getElementById('main-content'))">${icons.chevRight}</button>
        </div>
      </div>`;
    }
    html += '</div>';
  }

  html += '</div>';
  el.innerHTML = html;
}
function selectService(name) {
  state.selectedService = state.selectedService === name ? null : name;
  state.selectedBucket = null;
  state.svcPage = 0;
  renderServiceCount(document.getElementById('main-content'));
}
function selectBucket(bucket) {
  state.selectedBucket = state.selectedBucket === bucket ? null : bucket;
  state.selectedService = null;
  state.svcPage = 0;
  renderServiceCount(document.getElementById('main-content'));
}

// =================== MERGE ===================
function renderMerge(el) {
  const mergeLog = DATA.mergeLog || [];
  let html = '<div class="space-y" style="max-width:800px">';
  html += `<div><h1 style="font-size:24px;font-weight:700;display:flex;align-items:center;gap:8px"><span style="color:var(--brand)">${icons.merge}</span> Merge Review</h1><p class="text-sm text-muted" style="margin-top:2px">Duplicates are automatically merged during every sync. This log shows all completed merges.</p></div>`;

  // Status banner
  html += `<div class="card merge-banner" style="background:var(--green-bg);border-color:rgba(34,197,94,0.3)">
    <span style="color:var(--green)">${icons.check}</span>
    <div><span style="font-weight:600;font-size:14px">Auto-Merge Active</span><p style="font-size:13px;color:var(--text-muted);margin-top:2px">Contacts with the same phone or email are automatically merged after every sync. All SMS, emails, timeline events, and notes are transferred to the surviving record.</p></div>
  </div>`;

  // Merge log
  html += `<div class="card"><div class="card-header"><h3 style="display:flex;align-items:center;gap:8px">${icons.merge} Merge History (${mergeLog.length})</h3></div><div class="card-body-np">`;
  if (mergeLog.length === 0) {
    html += '<p style="padding:32px;text-align:center;color:var(--text-muted);font-size:14px">No merges have occurred yet.</p>';
  } else {
    mergeLog.forEach(m => {
      html += `<div class="merge-entry" style="display:flex;align-items:center;justify-content:space-between;padding:16px">
        <div class="flex items-center gap-3">
          <div style="width:32px;height:32px;border-radius:50%;background:var(--brand-bg);display:flex;align-items:center;justify-content:center"><span style="color:var(--brand)">${icons.merge}</span></div>
          <div>
            <div style="font-size:14px"><span style="font-weight:500">${esc(m.winner_name || m.winner_email || (m.winner_contact_id ? m.winner_contact_id.substring(0,8) : 'Contact'))}</span> <span class="text-muted">absorbed duplicate</span> <span style="font-size:12px;font-family:monospace;color:var(--text-muted)">${m.loser_contact_id ? m.loser_contact_id.substring(0,8) + '...' : ''}</span></div>
            <div style="font-size:12px;color:var(--text-muted);margin-top:2px">${m.merged_at ? timeAgo(m.merged_at) : ''}</div>
          </div>
        </div>
        <span class="badge badge-gray" style="font-size:10px">${esc((m.merge_reason || 'duplicate').replace('auto_', 'Auto: '))}</span>
      </div>`;
    });
  }
  html += '</div></div></div>';
  el.innerHTML = html;
}
</script>
</body>
</html>
